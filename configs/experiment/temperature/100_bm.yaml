# @package _global_

run_flags:
  data_understanding: false
  data_preparation: false
  run_training: true

training: 
  save_results_dir_path: path/to/results/training/deep_range/temperature/100
  save_results_inception: path/to/results/training/inception/temperature/100
  save_results_rocket: path/to/results/training/rocket/temperature/100
  save_results_resnet: path/to/results/training/resnet/temperature/100

  use_truck_data: false
  use_uea: false
  use_benchmark: true

  sequence_length: 100
  label: air_temperature_label
  num_classes: 6
  num_channels: 37

  num_workers: 24
  batch_size: 1024
  epochs: 30

