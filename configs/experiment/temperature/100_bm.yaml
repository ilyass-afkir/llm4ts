# @package _global_
# python llm-erange/main.py --multirun +experiment/temperature=500_bm,100_bm

run_flags:
  data_understanding: false
  data_preparation: false
  run_training: true

training: 
  save_results_dir_path: /mnt/nvme3/ilafkir/results/training/deep_range/temperature/100
  save_results_inception: /mnt/nvme3/ilafkir/results/training/inception/temperature/100
  save_results_rocket: /mnt/nvme3/ilafkir/results/training/rocket/temperature/100
  save_results_resnet: /mnt/nvme3/ilafkir/results/training/resnet/temperature/100

  use_truck_data: false
  use_uea: false
  use_benchmark: true

  sequence_length: 100
  label: air_temperature_label
  num_classes: 6
  num_channels: 37

  num_workers: 24
  batch_size: 1024
  epochs: 30

