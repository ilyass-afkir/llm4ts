run_flags:
  data_understanding: false
  data_preparation: false
  run_training: true

training: 
  save_results_dir_path: /mnt/nvme3/ilafkir/results/training/deep_range/surface/100
  save_results_inception: /mnt/nvme3/ilafkir/results/training/inception/surface/100
  save_results_rocket: /mnt/nvme3/ilafkir/results/training/rocket/surface/100
  save_results_resnet: /mnt/nvme3/ilafkir/results/training/resnet/surface/100

  use_truck_data: false
  use_uea: false
  use_benchmark: true

  sequence_length: 100
  label: surface_condition_label
  num_classes: 3
  num_channels: 37

  num_workers: 24
  batch_size: 256
  epochs: 40
