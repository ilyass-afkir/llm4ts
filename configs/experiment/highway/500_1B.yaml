# @package _global_
# python llm-erange/main.py --multirun +experiment/highway=500_1B,500_8B

run_flags:
  data_understanding: false
  data_preparation: false
  run_training: true

defaults:
  - override /model: deep_range_v2
  - override /llm: Llama-3.2-1B

model:
  lora_config:
    r: 8
    lora_alpha: 16
    target_modules: 
      - q_proj
      - k_proj
      - v_proj
    lora_dropout: 0.1
    bias: none 

  trainable_llm_params: 
    - lora

  # Patch Embedding
  patch_length: 32
  patch_stride: 16
  patch_embedding_dropout: 0.1

  # Classification head
  dropout: 0.05
  activation: relu

  # Source embedding
  small_vocab_size: 2000

  # Reprogramming Layer
  attention_dropout: 0.1

llm:
  quantization: "none"

training: 
  save_results_dir_path: /mnt/nvme3/ilafkir/results/training/deep_range/highway/500_1B
  save_results_inception: /mnt/nvme3/ilafkir/results/training/inception/highway/500
  save_results_rocket: /mnt/nvme3/ilafkir/results/training/rocket/highway/500
  save_results_resnet: /mnt/nvme3/ilafkir/results/training/resnet/highway/500

  use_truck_data: true
  use_uea: false
  use_benchmarks: false

  # Device
  device: "cuda:0"

  # Task configs
  sequence_length: 500
  label: highway_label
  num_classes: 6
  num_channels: 39
  
  # Data Loader
  num_workers: 24
  batch_size: 256

  # Loss function
  label_smoothing: 0.05

  # Optimizer 
  learning_rate: 1e-4    
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1e-8

  # Learning Rate Scheduler
  warmup_ratio: 0.3
  alpha_f: 0.1
  restart_interval: 5
  T_mult: 1         

  # Training loop
  epochs: 100
  patience: 20
  max_grad_norm: 1.0