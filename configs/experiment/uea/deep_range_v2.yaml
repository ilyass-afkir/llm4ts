# @package _global_

run_flags:
  data_understanding: false
  data_preparation: false
  run_training: true

defaults:
  - override /model: deep_range_v2
  - override /llm: Llama-3.2-1B 

llm:
  quantization: None

training: 
  save_results_dir_path: path/to/results/training/uea_normalized/final/dp_v2

  use_truck_data: false
  use_uea: true
  use_benchmarks: false
  
  # Optimizer 
  learning_rate: 1e-4
  weight_decay: 0.01
  
  # Loss function
  label_smoothing: 0.05

  # Training loop
  epochs: 100
  patience: 20
  max_grad_norm: 1.0
