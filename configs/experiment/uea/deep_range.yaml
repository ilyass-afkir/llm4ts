# @package _global_
# python llm-erange/main.py --multirun +experiment/uea=deep_range,deep_range_v2,time_llm

run_flags:
  data_understanding: false
  data_preparation: false
  run_training: true

defaults:
  - override /model: deep_range
  - override /llm: Llama-3.2-1B 

llm:
  quantization: None

training: 
  save_results_dir_path: /mnt/nvme3/ilafkir/results/training/uea_normalized/final/dp_v1
  
  use_truck_data: false
  use_uea: true
  use_benchmarks: false
  
  learning_rate: 1e-4
  weight_decay: 0.01
  
  label_smoothing: 0.05

  # Training loop
  epochs: 100
  patience: 20
  max_grad_norm: 1.0
