name: training

# Paths
truck_data_split_dir: path/to/datasets/truck_data_split
uea_data_dir: path/to/datasets/UEA

results_dir: path/to/results
results_dir_inception: path/to/results/training/inception
results_dir_rocket: path/to/results/training/rocket
results_dir_resnet: path/to/results/training/resnet

use_truck_data: false
use_uea: true
use_benchmark_models: false

# Device
device: "cuda:0"

# Task configs
sequence_length: 100
label: highway_label
num_classes: 6
num_channels: 39

# Data Loader
num_workers: 24
batch_size: 32

# Loss function
label_smoothing: 0.05

# Optimizer 
learning_rate: 1e-4
weight_decay: 0.01
betas: [0.9, 0.999]
eps: 1e-8

# Learning Rate Scheduler
warmup_ratio: 0.1
alpha_f: 0.01

# Training loop
epochs: 100
patience: 20
max_grad_norm: 1.0















